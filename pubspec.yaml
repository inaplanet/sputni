name: aetherlink
version: 0.1.0+1
description: Cross-platform Flutter app for WebRTC camera-to-monitor streaming.
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^0.10.7
  web_socket_channel: ^2.4.0
  qr_flutter: ^4.1.0
  video_player: ^2.9.2
  path_provider: ^2.1.5
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/media/cameramode.mp4
    - assets/media/monitormode.mp4
